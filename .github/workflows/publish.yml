name: Publish to npm

# Publishes when a version tag (e.g. v0.1.2) is pushed.
#
# Auth uses npm Trusted Publishing (OIDC) - NO npm token/secret is stored.
# One-time setup on npmjs.com: package -> Settings -> Trusted Publisher ->
# GitHub Actions, with:
#   organization/user : Roblens
#   repository        : relationalseo-mcp
#   workflow filename : publish.yml
# Provenance is attached automatically under trusted publishing.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing needs a recent npm (>= 11.5.1); the bundled npm is older.
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG  tag=$TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG. Bump the version, commit, then tag."
            exit 1
          fi

      - run: npm ci

      - run: npm run build

      # No NODE_AUTH_TOKEN: npm mints a short-lived OIDC credential automatically.
      - name: Publish (Trusted Publishing via OIDC)
        run: npm publish --access public
